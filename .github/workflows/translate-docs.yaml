name: Translate docs
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v7
      - name: Translate to portuguese
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh extension install https://github.com/github/gh-models
          gh models run openai/gpt-4o-mini "Translate to portuguese. Only output the translated text: $(cat README.md)" > README-PT.md
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update translations [skip ci]"
