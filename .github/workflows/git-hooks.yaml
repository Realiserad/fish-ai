name: Run git hooks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install dependencies
        run: uv sync
      - uses: fish-shop/install-fish-shell@v2
      - uses: j178/prek-action@v2
